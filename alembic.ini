# Alembic configuration for NEXUS Kia'i

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# sys.path to include on startup — we need the project root
prepend_sys_path = .

# Timezone for migration timestamps
timezone = UTC

# Truncate long messages
truncate_slug_length = 40

# Use async-compatible output encoding
output_encoding = utf-8

# sqlalchemy.url is overridden from env in alembic/env.py
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/nexus


[post_write_hooks]
# Format migration files with black if installed
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
